[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npm install -g pnpm@11.7.0", "pnpm install --prod=false --frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
cmds = ["pnpm turbo build --filter=@buildos/worker"]

[start]
cmd = "node apps/worker/dist/index.js"
