<!-- apps/web/src/app.html -->
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>

		<link rel="icon" type="image/png" sizes="32x32" href="/AppImages/ios/32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/AppImages/ios/16.png" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/AppImages/ios/180.png" />
		<link
			rel="icon"
			type="image/png"
			sizes="192x192"
			href="/AppImages/android/android-launchericon-192-192.png"
		/>
		<meta name="apple-mobile-web-app-title" content="BuildOS" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Additional iOS icon sizes -->
		<link rel="apple-touch-icon" sizes="120x120" href="/AppImages/ios/120.png" />
		<link rel="apple-touch-icon" sizes="152x152" href="/AppImages/ios/152.png" />
		<link rel="apple-touch-icon" sizes="167x167" href="/AppImages/ios/167.png" />

		<!-- Android Chrome icons -->
		<link
			rel="icon"
			type="image/png"
			sizes="144x144"
			href="/AppImages/android/android-launchericon-144-144.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="512x512"
			href="/AppImages/android/android-launchericon-512-512.png"
		/>

		<!-- Enhanced iOS/Safari support -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="format-detection" content="telephone=no" />

		<!-- Theme colors for light/dark mode -->
		<meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

		<!-- Default theme color for iOS status bar -->
		<meta name="theme-color" content="#0f172a" />

		<!-- iOS splash screens (optional but recommended) -->
		<meta name="apple-touch-fullscreen" content="yes" />

		<!--
			Recover tabs that are still running a previous deployment. Vercel removes
			old hashed chunks, so a client-side navigation can otherwise fail when
			Vite tries to import an asset that no longer exists.
		-->
		<script>
			(() => {
				const reloadKey = 'buildos:preload-error-reload';
				const reloadCooldownMs = 60_000;

				window.addEventListener('vite:preloadError', (event) => {
					let lastReloadAt = 0;

					try {
						lastReloadAt = Number(window.sessionStorage.getItem(reloadKey) ?? 0);
					} catch {
						// Without a persisted guard, reloading could create a loop.
						return;
					}

					const reloadAt = Date.now();
					if (reloadAt - lastReloadAt < reloadCooldownMs) {
						return;
					}

					try {
						window.sessionStorage.setItem(reloadKey, String(reloadAt));
					} catch {
						return;
					}

					event.preventDefault();
					window.location.reload();
				});
			})();
		</script>

		%sveltekit.head%
	</head>

	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
