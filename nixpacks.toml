# Nixpacks configuration for worker service deployment on Railway
# This file must be at the repository root for Railway to find it
# when the root directory is set to /
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npx --yes pnpm@11.7.0 install --prod=false --frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
cmds = ["npx --yes pnpm@11.7.0 exec turbo build --filter=@buildos/worker"]

[start]
cmd = "node apps/worker/dist/index.js"
