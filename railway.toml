# Railway configuration for worker service deployment
# This file must be at the repository root for Railway to find it
# when the root directory is set to /
[build]
builder = "NIXPACKS"
buildCommand = "npx --yes pnpm@11.7.0 exec turbo build --filter=@buildos/worker"
watchPatterns = [
  "apps/worker/**",
  "packages/**",
  "patches/**",
  "turbo.json",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "railway.toml",
  "nixpacks.toml"
]

[deploy]
startCommand = "node apps/worker/dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[variables]
NODE_ENV = "production"
