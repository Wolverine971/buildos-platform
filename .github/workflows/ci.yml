# .github/workflows/ci.yml
name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    checks:
        name: Typecheck, lint, test
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4

            # Reads the pnpm version from the packageManager field in package.json
            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # SvelteKit $env/static modules need values present at build/test time.
            # CI has no real secrets; the example files provide placeholder values.
            - name: Provide placeholder env
              run: |
                  cp .env.example .env
                  cp apps/web/.env.example apps/web/.env
                  cp apps/worker/.env.example apps/worker/.env

            - name: Typecheck
              run: pnpm turbo typecheck

            - name: Lint
              run: pnpm turbo lint

            - name: Test coverage
              run: pnpm turbo test:coverage

            # Disposable-PostgreSQL suite proving the deep-research DB guarantees
            # (budget races, privilege fences, synthesis wakeup). Runner images
            # ship postgres binaries outside PATH; the suite skips gracefully if
            # none are found, so surface the bin dir explicitly.
            - name: Deep-research DB integration tests
              run: |
                  PG_BIN="$(ls -d /usr/lib/postgresql/*/bin 2>/dev/null | sort -V | tail -n 1)"
                  if [ -n "$PG_BIN" ]; then export PATH="$PG_BIN:$PATH"; fi
                  command -v initdb >/dev/null || { echo "::error::no postgres binaries on runner"; exit 1; }
                  pnpm --filter @buildos/worker test:deep-research:integration

            - name: Upload coverage artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-reports
                  path: |
                      apps/web/coverage/**
                      apps/worker/coverage/**
                      packages/*/coverage/**
                  if-no-files-found: warn
                  retention-days: 14
