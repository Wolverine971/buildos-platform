nodes:
    - id: skill.hook-craft-short-form
      type: skill
      name: Hook Craft For Short-Form
      summary: Produce a hook bundle with archetype, slot map, three beats, visual/text/audio cues, diagnostics, variants, and payoff check.

    - id: primitive.hook-archetype-selection
      type: primitive_skill
      name: Hook Archetype Selection
      summary: Pick a strategic hook shape from the available visual and contrast, not from a blank topic prompt.

    - id: primitive.six-slot-grammar
      type: primitive_skill
      name: Six-Slot Grammar
      summary: Fill subject, action, objective, contrast, proof, and time slots before chasing clever wording.

    - id: primitive.three-beat-structure
      type: primitive_skill
      name: Three-Beat Hook Structure
      summary: Shape the opener as context lean, scroll-stop interjection, and contrarian snapback.

    - id: primitive.four-mistake-diagnostic
      type: primitive_skill
      name: Four-Mistake Diagnostic
      summary: Audit delay, confusion, irrelevance, and disinterest in order before shipping.

    - id: primitive.visual-text-audio-alignment
      type: primitive_skill
      name: Visual Text Audio Alignment
      summary: Make the spoken hook, key visual, text overlay, and audio cue point at the same opt-in promise.

    - id: primitive.variant-log-and-payoff-check
      type: primitive_skill
      name: Variant Log And Payoff Check
      summary: Produce multiple hook variants and record whether the body actually pays off the promise.

    - id: guardrail.no-empty-snapback
      type: guardrail
      name: No Empty Snapback
      summary: Reject clever contrasts that the body cannot substantiate.

    - id: guardrail.no-blank-llm-hooks
      type: guardrail
      name: No Blank LLM Hooks
      summary: Use LLMs to clarify seeded hooks, not to invent hooks from an empty prompt.

    - id: output.hook-bundle
      type: output_artifact
      name: Hook Bundle
      summary: The required deliverable containing archetype, slot map, beats, spoken hook, overlay, visual, audio, diagnostics, variants, and payoff note.

source_claims:
    - id: claim.kallaway.irresistible.three-beat
      source_id: source.kallaway.irresistible-hooks
      summary: Strong hooks can be structured as a context lean, a scroll-stop interjection, and a contrarian snapback.
      used_for:
          - primitive.three-beat-structure

    - id: claim.kallaway.irresistible.visual-load-bearing
      source_id: source.kallaway.irresistible-hooks
      summary: Visual hooks carry disproportionate attention weight, so spoken copy should support the key visual.
      used_for:
          - primitive.visual-text-audio-alignment
          - primitive.hook-archetype-selection

    - id: claim.kallaway.impossible.two-variable-test
      source_id: source.kallaway.hooks-impossible-to-skip
      summary: A hook must pass topic clarity and on-target curiosity before it is worth polishing.
      used_for:
          - primitive.four-mistake-diagnostic
          - output.hook-bundle

    - id: claim.kallaway.impossible.four-mistakes
      source_id: source.kallaway.hooks-impossible-to-skip
      summary: Delay, confusion, irrelevance, and disinterest are the four primary hook failure modes.
      used_for:
          - primitive.four-mistake-diagnostic

    - id: claim.kallaway.impossible.clarity-rewrite
      source_id: source.kallaway.hooks-impossible-to-skip
      summary: LLM rewriting is useful for preserving meaning while lowering reading level and removing ambiguity.
      used_for:
          - guardrail.no-blank-llm-hooks

    - id: claim.kallaway.100-viral-hooks.six-archetypes
      source_id: source.kallaway.100-viral-hooks
      summary: Six repeatable hook archetypes can describe the major strategic shapes of short-form openings.
      used_for:
          - primitive.hook-archetype-selection

    - id: claim.kallaway.100-viral-hooks.sandwich
      source_id: source.kallaway.100-viral-hooks
      summary: Viewers scan visual context, parse the spoken hook, then return to the visual for confirmation.
      used_for:
          - primitive.visual-text-audio-alignment

    - id: claim.kallaway.6-words.slot-grammar
      source_id: source.kallaway.6-words-hook
      summary: 'Hooks can be audited through six structural slots: subject, action, objective, contrast, proof, and time.'
      used_for:
          - primitive.six-slot-grammar

    - id: claim.kallaway.6-words.copy-work
      source_id: source.kallaway.6-words-hook
      summary: Copy-work and slot tagging make hook craft a repeatable audit process instead of blank-page ideation.
      used_for:
          - primitive.variant-log-and-payoff-check
          - guardrail.no-blank-llm-hooks

