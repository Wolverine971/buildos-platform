nodes:
    - id: skill.landing-page-scorecard-funnel
      type: skill
      name: Landing Page Scorecard Funnel
      summary: Build a scorecard funnel that sells the assessment, captures intent signals, and routes leads to the right next step.

    - id: primitive.scorecard-funnel-architecture
      type: primitive_skill
      name: Scorecard Funnel Architecture
      summary: Treat the landing page, questionnaire, dynamic results page, and follow-up path as one conversion system.

    - id: primitive.mode-selection
      type: primitive_skill
      name: Mode Selection
      summary: Decide whether a scorecard can stand alone or needs a setup layer before the assessment.

    - id: primitive.assessment-promise-copy
      type: primitive_skill
      name: Assessment Promise Copy
      summary: Write hooks, subheads, and CTA copy that sell the value, time cost, and payoff of taking the assessment.

    - id: primitive.setup-layer-positioning
      type: primitive_skill
      name: Setup Layer Positioning
      summary: Frame market insight, current alternatives, and the perfect-world scenario before asking a considered buyer to engage.

    - id: primitive.alternatives-aware-value-prop
      type: primitive_skill
      name: Alternatives-Aware Value Proposition
      summary: Define the three measured areas by showing why this assessment is better than the alternatives the buyer already considers.

    - id: primitive.questionnaire-signal-design
      type: primitive_skill
      name: Questionnaire Signal Design
      summary: Design contact capture, best-practice questions, and qualification questions that produce both value and sales signals.

    - id: primitive.dynamic-results-personalization
      type: primitive_skill
      name: Dynamic Results Personalization
      summary: Turn answers into a score, tailored insights, and a next step that visibly reflects the respondent's inputs.

    - id: primitive.lead-segment-routing
      type: primitive_skill
      name: Lead Segment Routing
      summary: Route high-fit, middle-fit, and low-fit leads to different offers instead of sending everyone to the same CTA.

    - id: primitive.credibility-and-trust
      type: primitive_skill
      name: Credibility And Trust
      summary: Use creator background, evidence, proof, and honest trade-offs to make the assessment believable without manipulation.

    - id: guardrail.no-fomo
      type: guardrail
      name: No FOMO CTA
      summary: Avoid scarcity, urgency, and pressure tactics because they damage trust and downstream qualification quality.

    - id: guardrail.no-generic-results
      type: guardrail
      name: No Generic Results Page
      summary: Do not claim personalization if the results page ignores the respondent's answers.

source_claims:
    - id: claim.priestley.assessment-funnel-three-part-system
      source_id: source.daniel-priestley.1m-landing-page
      summary: 'A high-converting scorecard funnel has three connected parts: landing page, questionnaire, and dynamic results page.'
      used_for:
          - primitive.scorecard-funnel-architecture

    - id: claim.priestley.landing-page-five-sections
      source_id: source.daniel-priestley.1m-landing-page
      summary: The landing page should move through hook, assessment promise, value proposition, credibility, and CTA.
      used_for:
          - primitive.assessment-promise-copy
          - primitive.credibility-and-trust

    - id: claim.priestley.cta-stack
      source_id: source.daniel-priestley.1m-landing-page
      summary: The CTA should stack the action, time cost, free price, and immediate payoff.
      used_for:
          - primitive.assessment-promise-copy

    - id: claim.priestley.questionnaire-buckets
      source_id: source.daniel-priestley.1m-landing-page
      summary: Use 15 questions across contact capture, best-practice scoring, and five qualification questions.
      used_for:
          - primitive.questionnaire-signal-design

    - id: claim.priestley.dynamic-results-and-routing
      source_id: source.daniel-priestley.1m-landing-page
      summary: The results page should reveal a score, provide tailored insights, and route respondents by fit.
      used_for:
          - primitive.dynamic-results-personalization
          - primitive.lead-segment-routing

    - id: claim.dunford.setup-before-product
      source_id: source.april-dunford.sales-pitch-framework
      summary: Considered buyers need market context, alternatives, and a perfect-world scenario before the product or ask.
      used_for:
          - primitive.setup-layer-positioning
          - primitive.mode-selection

    - id: claim.dunford.differentiated-value
      source_id: source.april-dunford.sales-pitch-framework
      summary: Differentiated value answers why the buyer should pick this option over the alternatives.
      used_for:
          - primitive.alternatives-aware-value-prop

    - id: claim.dunford.anti-fomo
      source_id: source.april-dunford.sales-pitch-framework
      summary: FOMO-driven sales pressure should be avoided because it creates manipulated buyers and churn.
      used_for:
          - primitive.credibility-and-trust
          - guardrail.no-fomo

edges:
    - from: skill.landing-page-scorecard-funnel
      to: primitive.scorecard-funnel-architecture
      type: composed_of
      confidence: 0.95
      rationale: The root skill is primarily a conversion system made from landing page, quiz, result page, and routing mechanics.

    - from: skill.landing-page-scorecard-funnel
      to: primitive.mode-selection
      type: composed_of
      confidence: 0.9
      rationale: The skill must decide whether the assessment can stand alone or needs buyer worldview setup first.

    - from: skill.landing-page-scorecard-funnel
      to: primitive.assessment-promise-copy
      type: composed_of
      confidence: 0.95
      rationale: The page exists to sell the assessment rather than the full product.

    - from: skill.landing-page-scorecard-funnel
      to: primitive.setup-layer-positioning
      type: composed_of
      confidence: 0.85
      rationale: Setup-layered mode is required for B2B and considered purchases.

    - from: skill.landing-page-scorecard-funnel
      to: primitive.alternatives-aware-value-prop
      type: composed_of
      confidence: 0.9
      rationale: The measured areas must explain why this assessment is worth taking over known alternatives.

    - from: skill.landing-page-scorecard-funnel
      to: primitive.questionnaire-signal-design
      type: composed_of
      confidence: 0.95
      rationale: The assessment's questions produce both user insight and qualification data.

    - from: skill.landing-page-scorecard-funnel
      to: primitive.dynamic-results-personalization
      type: composed_of
      confidence: 0.95
      rationale: The respondent must see the payoff immediately after answering.

    - from: skill.landing-page-scorecard-funnel
      to: primitive.lead-segment-routing
      type: composed_of
      confidence: 0.95
