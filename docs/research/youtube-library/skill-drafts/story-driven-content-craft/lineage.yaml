nodes:
    - id: skill.story-driven-content-craft
      type: skill
      name: Story-Driven Content Craft
      summary: Produce or audit nonfiction pieces through lens, ending, beat outline, dopamine ladder, rhythm, and reject-pass diagnostics.

    - id: primitive.dopamine-ladder-diagnostic
      type: primitive_skill
      name: Dopamine Ladder Diagnostic
      summary: Walk stimulation, captivation, anticipation, validation, affection, and revelation to find the first broken rung.

    - id: primitive.but-therefore-beat-structure
      type: primitive_skill
      name: But Therefore Beat Structure
      summary: Replace additive outlines with conflict and consequence transitions.

    - id: primitive.rhythm-and-tone-pass
      type: primitive_skill
      name: Rhythm And Tone Pass
      summary: Vary sentence length, read aloud, and rewrite broadcast voice into direct address.

    - id: primitive.ending-first-direction
      type: primitive_skill
      name: Ending-First Direction
      summary: Write the last line before drafting so the piece has a memorable landing.

    - id: primitive.lens-selection
      type: primitive_skill
      name: Lens Selection
      summary: Pick a non-obvious, founder-specific lens instead of generic topic coverage.

    - id: primitive.rebuy-loop-map
      type: primitive_skill
      name: Rebuy Loop Map
      summary: After each payoff, open the next real question so the viewer repeatedly re-decides to stay.

    - id: primitive.seven-mistake-reject-pass
      type: primitive_skill
      name: Seven-Mistake Reject Pass
      summary: Filter traditional arcs, W-stack errors, missing rebuys, missing villains, weak rooting interest, low shareability, and absent visuals.

    - id: guardrail.no-manufactured-rebuy-stakes
      type: guardrail
      name: No Manufactured Rebuy Stakes
      summary: Curiosity loops must come from real stakes the body can defend, not fake cliffhangers.

    - id: guardrail.no-tier-one-lens
      type: guardrail
      name: No Tier One Lens
      summary: Reject saturated descriptive coverage unless a non-obvious proof or founder-specific angle is attached.

    - id: output.story-craft-bundle
      type: output_artifact
      name: Story Craft Bundle
      summary: The required deliverable containing inquiry, lens, last line, first line, beat outline, intensity curve, rebuy map, audience map, villain, visual brief, rhythm audit, and reject pass.

source_claims:
    - id: claim.master-storyteller.but-therefore
      source_id: source.kallaway.master-storyteller
      summary: Strong narrative beats connect through conflict and consequence instead of "and then" accumulation.
      used_for:
          - primitive.but-therefore-beat-structure

    - id: claim.master-storyteller.rhythm-tone-direction-lens
      source_id: source.kallaway.master-storyteller
      summary: Story craft improves through rhythm, direct tone, ending-first direction, non-obvious lens, and visual hook decisions.
      used_for:
          - primitive.rhythm-and-tone-pass
          - primitive.ending-first-direction
          - primitive.lens-selection

    - id: claim.storytelling-genius.dopamine-ladder
      source_id: source.kallaway.storytelling-genius
      summary: Viewers climb a six-rung ladder from stimulation to revelation; skipped rungs collapse retention.
      used_for:
          - primitive.dopamine-ladder-diagnostic

    - id: claim.storytelling-genius.validation
      source_id: source.kallaway.storytelling-genius
      summary: Curiosity pays off only when validation is non-obvious and worth the anticipation it created.
      used_for:
          - primitive.rebuy-loop-map
          - guardrail.no-manufactured-rebuy-stakes

    - id: claim.storytelling-mistakes.kallaway-arc
      source_id: source.kallaway.7-storytelling-mistakes
      summary: Internet-native stories should start high, spike early, release, and re-peak instead of relying on a slow traditional arc.
      used_for:
          - primitive.rebuy-loop-map
          - primitive.seven-mistake-reject-pass

    - id: claim.storytelling-mistakes.w-stack-villain-shareability
      source_id: source.kallaway.7-storytelling-mistakes
      summary: The reject pass catches W-order mistakes, missing villains, missing rooting interest, weak atomic shareability, and absent visuals.
      used_for:
          - primitive.seven-mistake-reject-pass

