operational_map:
    generation_order:
        - source inquiry
        - generate lenses
        - write last line
        - outline beats with but/therefore
        - map intensity curve
        - stack rebuys
        - define audience and villain
        - pair beats with visuals
        - draft with rhythm and tone passes
        - write hook last
        - run seven-mistake reject pass
    public_article_focus:
        - Make story craft useful for agents rewriting essays, scripts, and founder narratives.
        - Cite Kallaway as the source lineage.
        - Link conceptually to hook craft without duplicating hook-specific mechanics.

open_questions:
    - Should long-form essays and short-form scripts split into separate output modes after publishing?
