operational_map:
    generation_order:
        - confirm campaign mode (volume, strategic, single-target, reply-revival, investor)
        - verify deliverability infrastructure
        - segment list (persona x signal)
        - build persona prep (lists + templates + AI enrichment)
        - design front-end offer
        - run packaging pass (subject + preview)
        - draft body (mode-dependent register)
        - add proof slot and artifact CTA when credible
        - replace passive language
        - audit authenticity bridge
        - plan cadence by mode
        - build reply routes (objection bank or low-friction reply fork)
        - plan back-end qualification (if volume)
        - set up tracking baselines
    public_article_focus:
        - Make cold outreach reusable for agents and founders.
        - Keep all source layers visibly cited.
        - Avoid agency-tool affiliate links in public copy.

