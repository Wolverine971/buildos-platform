nodes:
    - id: skill.cold-email-engagement-first-outreach
      type: skill
      name: Cold Email Engagement-First Outreach
      summary: Produce a campaign bundle (mode + segmentation + offer + body + cadence + tracking + objection bank) or a diagnostic report.

    - id: primitive.deliverability-infrastructure-floor
      type: primitive_skill
      name: Deliverability Infrastructure Floor
      summary: Verify SPF/DKIM/DMARC, spam complaint rate < 0.1%, 5 inboxes/domain, 30-50 emails/inbox/day, two-week warmup before any campaign ships.

    - id: primitive.persona-segmentation
      type: primitive_skill
      name: Persona Segmentation
      summary: Map each campaign to one persona x one narrowing signal. Reject mixed-persona lists.

    - id: primitive.coiled-spring-prep
      type: primitive_skill
      name: Coiled-Spring Prep
      summary: Move personalization upstream into pre-built lists, AI enrichment columns, and persona templates so the daily send target is 100+ in an hour, not 10 in a morning.

    - id: primitive.front-end-offer-design
      type: primitive_skill
      name: Front-End Offer Design
      summary: Wrap the core offer in a free, specific, custom deliverable that strangers will accept. Reject "worth a chat" framings.

    - id: primitive.three-paragraph-body
      type: primitive_skill
      name: Three-Paragraph Body
      summary: Strategic-mode body — who I am, why I am relevant, what I want — in four to six sentences across three short paragraphs.

    - id: primitive.casual-volume-body
      type: primitive_skill
      name: Casual Volume Body
      summary: Volume-mode body — 2-3 word lowercase subject, no greeting, one-sentence offer, "would that be worth sharing more?" CTA.

    - id: primitive.assumptive-language-replacement
      type: primitive_skill
      name: Assumptive Language Replacement
      summary: Replace every passive or interest-based CTA with assumptive directness. The goal of every email is a response.

    - id: primitive.two-mode-cadence
      type: primitive_skill
      name: Two-Mode Cadence
      summary: Strategic = 4-touch AB cadence with redirecting follow-ups. Volume = 2-touch then recycle non-responders into a new opener campaign.

    - id: primitive.three-rate-tracking
      type: primitive_skill
      name: Three-Rate Tracking
      summary: Track open / reply / meeting-booked separately. Each diagnoses a different broken input and routes to a different fix.

    - id: primitive.back-end-qualification
      type: primitive_skill
      name: Back-End Qualification
      summary: For volume mode, gate calendar with a pre-call form. Quality filters on the back end, not the front end.

    - id: primitive.objection-response-bank
      type: primitive_skill
      name: Objection Response Bank
      summary: Maintain base templates per common objection. Acknowledge-and-redirect. Customize 1-2 lines per send.

    - id: primitive.packaging-pass
      type: primitive_skill
      name: Packaging Pass
      summary: Score subject line plus preview text before body quality. The open mechanism should look internal, specific, and non-promotional.

    - id: primitive.authenticity-bridge
      type: primitive_skill
      name: Authenticity Bridge
      summary: Connect any research or personal hook to the business reason for writing. Reject decorative personalization and AI snippets that do not semantically fit.

    - id: primitive.proof-slot
      type: primitive_skill
      name: Proof Slot
      summary: Include relevant peer, customer, artifact, or situation proof when credible. Proof should show the sender has seen a similar problem before.

    - id: primitive.artifact-cta
      type: primitive_skill
      name: Artifact CTA
      summary: Ask for the smallest useful yes by offering to send a sample, snapshot, teardown, signals, ideas, or deck rather than defaulting to a meeting.

    - id: primitive.low-friction-reply-fork
      type: primitive_skill
      name: Low-Friction Reply Fork
      summary: Use respectful numbered options to convert silence into context, route objections, or qualify the buyer's current state.

    - id: primitive.investor-outreach-mode
      type: primitive_skill
      name: Investor Outreach Mode
      summary: Fundraising-specific cold email schema with a short factual payload, simple language, company-domain sender trust, no meeting-first ask, and slow follow-up.

    - id: guardrail.no-passive-cta
      type: guardrail
      name: No Passive CTA
      summary: Reject "worth a chat", "if you're interested", "is this worth exploring".

    - id: guardrail.no-fake-personalization
      type: guardrail
      name: No Fake Personalization
      summary: Reject fellow-eagle, dog-dad, generic-saw-your-post openers. AI enrichment must use real public context.

    - id: guardrail.no-long-cadences
      type: guardrail
      name: No 7-Touch Cadences
      summary: 4 touches max strategic, 2 touches max volume. Deliverability cost exceeds reply lift past these thresholds.

    - id: guardrail.no-uninspected-infrastructure
      type: guardrail
      name: No Uninspected Infrastructure
      summary: Refuse to ship if deliverability floor not met or unverified.

    - id: guardrail.no-loom-no-call-as-offer
      type: guardrail
      name: No Loom Or Call As Offer
      summary: Loom videos and calendar links are not offers. Reject and request a real deliverable.

    - id: guardrail.no-mixed-personas
      type: guardrail
      name: No Mixed Personas
      summary: One persona x one signal per campaign. Mixed lists produce illegible data.

    - id: guardrail.no-money-language-in-subject
      type: guardrail
      name: No Money Language In Subject
      summary: Dollar words and ROI numbers in subject pushes the email to the promo tab.

    - id: guardrail.no-unbridged-personalization
      type: guardrail
      name: No Unbridged Personalization
      summary: Reject personal or public-context hooks that do not connect honestly to the reason for outreach.

    - id: guardrail.no-investor-meeting-first
      type: guardrail
      name: No Investor Meeting-First Ask
      summary: Investor cold email must explain the company first and invite reply before asking for a meeting.

    - id: output.campaign-bundle
      type: output_artifact
      name: Campaign Bundle
      summary: The required deliverable containing mode, segmentation, infrastructure check, offer, subject, preview, body, cadence, tracking targets, objection stubs, and back-end form fields.

    - id: output.diagnostic-report
      type: output_artifact
      name: Diagnostic Report
      summary: The audit deliverable — mode mismatch, passive-language hits, cadence violations, offer gap, segmentation gap, tracking gap, plus 3 rewrite candidates.

source_claims:
    - id: claim.murray.three-paragraph-body
      source_id: source.murray.10-years-cold-email
      summary: Cold emails should fit a who-I-am / why-I-am-relevant / what-I-want structure across three short paragraphs.
      used_for:
          - primitive.three-paragraph-body

    - id: claim.murray.assumptive-language
      source_id: source.murray.10-years-cold-email
      summary: Passive and interest-based CTAs ("worth a chat") underperform assumptive directness ("I'm looking to set some time").
      used_for:
          - primitive.assumptive-language-replacement
          - guardrail.no-passive-cta

    - id: claim.murray.coiled-spring
      source_id: source.murray.10-years-cold-email
      summary: Pre-built persona x industry lists with paired templates raise daily throughput from 10 emails/day to 100+ emails/day.
      used_for:
          - primitive.coiled-spring-prep

    - id: claim.murray.ab-cadence
      source_id: source.murray.10-years-cold-email
      summary: 4-touch every-other-day cadence — initial, benefit-of-the-doubt, "please give me your thoughts on this", assumptive breakup — books 70-80% of meetings on the follow-ups, not the initial email.
      used_for:
          - primitive.two-mode-cadence

    - id: claim.murray.three-rate-tracking
      source_id: source.murray.10-years-cold-email
      summary: Open, reply, and meeting-booked rates diagnose three different broken inputs (subject/preview, body/CTA, why-relevant paragraph).
      used_for:
          - primitive.three-rate-tracking

    - id: claim.murray.strategic-vs-volume
      source_id: source.murray.10-years-cold-email
      summary: Cold outreach should be bucketed into a high-volume base-template bucket and a strategic-account bucket with deep research lines.
      used_for:
          - primitive.persona-segmentation
          - primitive.two-mode-cadence

    - id: claim.shepherd.volume-as-data
      source_id: source.shepherd.1.5m-cold-emails-2026
      summary: Small lists cannot produce statistical signal; volume is what allows replication of what works.
      used_for:
          - primitive.persona-segmentation

    - id: claim.shepherd.infrastructure-math
      source_id: source.shepherd.1.5m-cold-emails-2026
      summary: A 100K-prospect monthly campaign requires roughly 79 domains and 837 sending accounts at a 70/30 Outlook/Google split.
      used_for:
          - primitive.deliverability-infrastructure-floor

    - id: claim.shepherd.front-end-offer
      source_id: source.shepherd.1.5m-cold-emails-2026
      summary: Cold campaigns convert when wrapped in a free, specific, custom front-end offer (audit, teardown, validation, sample), not when pitching the core service.
      used_for:
          - primitive.front-end-offer-design
          - guardrail.no-loom-no-call-as-offer

    - id: claim.shepherd.casual-scripts
      source_id: source.shepherd.1.5m-cold-emails-2026
      summary: 2026 inboxes reward casual scripts that look phone-typed — short lowercase subjects, no greeting, one-sentence offer.
      used_for:
          - primitive.casual-volume-body

    - id: claim.shepherd.back-end-form
      source_id: source.shepherd.1.5m-cold-emails-2026
      summary: Quality should filter on the back end via a pre-call form, not by reducing send volume.
      used_for:
          - primitive.back-end-qualification

    - id: claim.schneider.engagement-first
      source_id: source.schneider.new-way-cold-emailing-2026
      summary: AI-driven spam filters (Gmail 2024, Microsoft 2025) prioritize engagement quality (replies, clicks, complaint rate) over sender reputation alone.
      used_for:
          - primitive.deliverability-infrastructure-floor

    - id: claim.schneider.deliverability-floor
      source_id: source.schneider.new-way-cold-emailing-2026
      summary: 5 inboxes per domain, 30-50 emails per inbox per day, two-week warmup, spam complaint rate < 0.1% is the 2026 deliverability floor.
      used_for:
          - primitive.deliverability-infrastructure-floor

    - id: claim.schneider.under-50-relevance
      source_id: source.schneider.new-way-cold-emailing-2026
      summary: Campaigns under 50 recipients average 5.8% reply rate vs 2.1% for >1000-recipient campaigns; relevance, not personalization, is the driver.
      used_for:
          - primitive.persona-segmentation

    - id: claim.schneider.two-touch
      source_id: source.schneider.new-way-cold-emailing-2026
      summary: First follow-up lifts replies 49%; email 3 drops them 20%; email 4+ drops them 55% and trains filters to flag the sender as bulk. Use 2 touches and recycle non-responders into a new opener campaign.
      used_for:
          - primitive.two-mode-cadence
          - guardrail.no-long-cadences

    - id: claim.schneider.value-as-deliverable
      source_id: source.schneider.new-way-cold-emailing-2026
      summary: 'Booking a call is not valuable. Sending a Loom is not valuable. The opener must solve a problem with an actual free deliverable.'
      used_for:
          - primitive.front-end-offer-design
          - guardrail.no-loom-no-call-as-offer

    - id: claim.schneider.ai-enrichment
      source_id: source.schneider.new-way-cold-emailing-2026
      summary: AI-enriched columns (LinkedIn headline, summary, company, website) feed templated prompts that produce personalized lines at scale from real public context.
      used_for:
          - primitive.coiled-spring-prep

    - id: claim.mckenna.executive-research
      source_id: source.mckenna.closing-time-smykm
      summary: Senior buyers publish enough public context on LinkedIn, interviews, posts, and profiles for a seller to earn attention with real research instead of interruption.
      used_for:
          - primitive.authenticity-bridge
          - guardrail.no-unbridged-personalization

    - id: claim.mckenna.thread-nurture
      source_id: source.mckenna.closing-time-smykm
      summary: Strategic executive outreach should preserve the researched thread and can test buyer-timed follow-ups such as Thursday, Friday, or weekend sends.
      used_for:
          - primitive.two-mode-cadence

    - id: claim.tatulea.packaging
      source_id: source.tatulea.30mpc-cold-email-showdown
      summary: 'Cold email should be judged first on packaging: subject line plus preview text should look internal, specific, and worth opening.'
      used_for:
          - primitive.packaging-pass

    - id: claim.tatulea.proof-artifact
      source_id: source.tatulea.30mpc-cold-email-showdown
      summary: Relevant social proof and concrete artifacts such as samples, snapshots, signals, or ideas create a smaller yes than a hard meeting ask.
      used_for:
          - primitive.proof-slot
          - primitive.artifact-cta

    - id: claim.efti.reply-fork
      source_id: source.efti.123-reply-hack
      summary: Numbered reply options lower the friction of responding and can turn silence, uncertainty, or objections into routeable buyer context.
      used_for:
          - primitive.low-friction-reply-fork

    - id: claim.seibel.investor-mode
      source_id: source.seibel.cold-email-investors
      summary: Investor cold email should be short, factual, jargon-free, sent from a named company email address, and designed to start a back-and-forth rather than force a meeting.
      used_for:
          - primitive.investor-outreach-mode
          - guardrail.no-investor-meeting-first

