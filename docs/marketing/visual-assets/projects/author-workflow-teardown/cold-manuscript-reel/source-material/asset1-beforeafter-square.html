<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<style>
			@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&display=swap');

			:root {
				--paper: #fbfaf7;
				--ink: #16161a;
				--muted: #66666e;
				--border: #d6d0c6;
				--accent: #b85416;
			}
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html,
			body {
				background: #2a2a2a;
			}

			/* 1:1 — 1080 x 1080 */
			.card {
				position: relative;
				width: 1080px;
				height: 1080px;
				background: var(--paper);
				overflow: hidden;
				padding: 40px 44px;
			}
			.grain {
				position: absolute;
				inset: 0;
				opacity: 0.045;
				pointer-events: none;
				mix-blend-mode: multiply;
			}

			.eyebrow {
				font-family: 'Inter', sans-serif;
				font-weight: 600;
				font-size: 19px;
				letter-spacing: 0.16em;
				text-transform: uppercase;
				color: var(--muted);
				display: flex;
				align-items: center;
				gap: 12px;
				margin-bottom: 14px;
			}
			.eyebrow .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--border);
			}

			/* after project — dominant, fills lower area */
			.after {
				position: absolute;
				left: 44px;
				right: 44px;
				bottom: 40px;
				top: 250px;
				border: 1px solid var(--border);
				border-radius: 16px;
				overflow: hidden;
				background: #fff;
				box-shadow: 0 20px 50px -26px rgba(22, 22, 26, 0.32);
			}
			.after img {
				display: block;
				width: 100%;
				margin-top: -2px;
			}

			/* before — small inset card, top, overlapping */
			.before {
				position: absolute;
				left: 44px;
				top: 74px;
				width: 720px;
				border: 1px solid var(--border);
				border-radius: 12px;
				overflow: hidden;
				background: #fff;
				box-shadow: 0 14px 34px -18px rgba(22, 22, 26, 0.34);
				z-index: 3;
			}
			.before img {
				display: block;
				width: 100%;
			}

			.before-tag {
				font-family: 'Inter', sans-serif;
				font-weight: 600;
				font-size: 16px;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--muted);
				margin-bottom: 8px;
			}

			/* orange arrow from before into after */
			.arrow {
				position: absolute;
				left: 792px;
				top: 150px;
				z-index: 4;
			}

			.wordmark {
				position: absolute;
				bottom: 60px;
				right: 66px;
				font-family: 'Inter', sans-serif;
				font-weight: 600;
				font-size: 21px;
				letter-spacing: 0.02em;
				color: var(--ink);
				opacity: 0.92;
				z-index: 5;
				text-shadow: 0 1px 8px rgba(251, 250, 247, 0.9);
			}
		</style>
	</head>
	<body>
		<div class="card">
			<svg class="grain" width="1080" height="1080">
				<filter id="g">
					<feTurbulence
						type="fractalNoise"
						baseFrequency="0.9"
						numOctaves="3"
						stitchTiles="stitch"
					/>
					<feColorMatrix type="saturate" values="0" />
				</filter>
				<rect width="100%" height="100%" filter="url(#g)" />
			</svg>

			<div class="eyebrow">
				<span>Before</span><span class="dot"></span><span>After</span>
			</div>

			<div class="before">
				<div style="padding: 12px 14px 0"><div class="before-tag">The brain dump</div></div>
				<img src="asset1-before-crop.png" alt="messy brain dump" />
			</div>

			<div class="arrow">
				<svg width="60" height="150" viewBox="0 0 60 150" fill="none">
					<path
						d="M30 4 C 30 60, 30 90, 30 132 M14 116 L30 134 L46 116"
						stroke="#b85416"
						stroke-width="6"
						stroke-linecap="round"
						stroke-linejoin="round"
					/>
				</svg>
			</div>

			<div class="after">
				<img src="asset1-after-fullpage.png" alt="structured revision plan in BuildOS" />
			</div>

			<div class="wordmark">BuildOS</div>
		</div>
	</body>
</html>
