<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<style>
			@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap');

			:root {
				--paper: #fbfaf7;
				--ink: #16161a;
				--muted: #66666e;
				--border: #d6d0c6;
				--accent: #b85416;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			html,
			body {
				background: #2a2a2a;
			}

			/* 4:5 portrait — 1080 x 1350 */
			.card {
				position: relative;
				width: 1080px;
				height: 1350px;
				background: var(--paper);
				overflow: hidden;
				padding: 66px 64px 58px;
				display: flex;
				flex-direction: column;
			}

			/* faint paper grain */
			.grain {
				position: absolute;
				inset: 0;
				opacity: 0.045;
				pointer-events: none;
				mix-blend-mode: multiply;
			}

			.eyebrow {
				font-family: 'Inter', sans-serif;
				font-weight: 600;
				font-size: 20px;
				letter-spacing: 0.16em;
				text-transform: uppercase;
				color: var(--muted);
				display: flex;
				align-items: center;
				gap: 14px;
				margin-bottom: 30px;
			}
			.eyebrow .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--border);
			}

			.tag {
				font-family: 'Inter', sans-serif;
				font-weight: 600;
				font-size: 19px;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--muted);
				margin-bottom: 16px;
				display: flex;
				align-items: baseline;
				gap: 12px;
			}
			.tag .sub {
				font-weight: 500;
				letter-spacing: 0.01em;
				text-transform: none;
				font-size: 20px;
				color: var(--muted);
				opacity: 0.85;
			}

			/* browser-card shell around each real screenshot */
			.shot {
				position: relative;
				border: 1px solid var(--border);
				border-radius: 16px;
				overflow: hidden;
				background: #fff;
				box-shadow:
					0 1px 0 rgba(255, 255, 255, 0.6) inset,
					0 18px 46px -22px rgba(22, 22, 26, 0.3);
			}
			.shot img {
				display: block;
				width: 100%;
			}

			.shot-before img {
				width: 100%;
			}

			/* after: hide the app top-nav by pulling the image up */
			.shot-after {
				height: 690px;
			}
			.shot-after img {
				margin-top: -37px;
			}

			.arrow-wrap {
				display: flex;
				justify-content: center;
				align-items: center;
				height: 92px;
			}
			.arrow-wrap svg {
				display: block;
			}

			.spacer {
				flex: 1;
			}

			.caption {
				font-family: 'IBM Plex Serif', serif;
				font-style: italic;
				font-weight: 500;
				font-size: 29px;
				line-height: 1.34;
				color: var(--ink);
				max-width: 30ch;
			}

			.wordmark {
				position: absolute;
				bottom: 52px;
				right: 64px;
				font-family: 'Inter', sans-serif;
				font-weight: 600;
				font-size: 22px;
				letter-spacing: 0.02em;
				color: var(--ink);
				opacity: 0.55;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<svg class="grain" width="1080" height="1350">
				<filter id="g">
					<feTurbulence
						type="fractalNoise"
						baseFrequency="0.9"
						numOctaves="3"
						stitchTiles="stitch"
					/>
					<feColorMatrix type="saturate" values="0" />
				</filter>
				<rect width="100%" height="100%" filter="url(#g)" />
			</svg>

			<div class="eyebrow">
				<span>Before</span><span class="dot"></span><span>After</span>
			</div>

			<div class="tag">
				The brain dump <span class="sub">— exactly how it came out of my head</span>
			</div>
			<div class="shot shot-before">
				<img src="asset1-before-crop.png" alt="messy brain dump input" />
			</div>

			<div class="arrow-wrap">
				<svg width="52" height="72" viewBox="0 0 52 72" fill="none">
					<path
						d="M26 2 L26 58 M10 42 L26 60 L42 42"
						stroke="#b85416"
						stroke-width="6"
						stroke-linecap="round"
						stroke-linejoin="round"
					/>
				</svg>
			</div>

			<div class="tag">
				Two minutes later <span class="sub">— a real BuildOS project</span>
			</div>
			<div class="shot shot-after">
				<img src="asset1-after-viewport.png" alt="structured revision plan in BuildOS" />
			</div>

			<div class="spacer"></div>

			<div class="caption">I didn't organize anything. I just talked through the mess.</div>

			<div class="wordmark">BuildOS</div>
		</div>
	</body>
</html>
